<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <style>
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes typeIn { from { width: 0; } to { width: 100%; } }
      @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
      @keyframes gridPulse { 0%, 100% { opacity: 0.06; } 50% { opacity: 0.12; } }
      .title { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; font-size: 72px; font-weight: 700; fill: #e0e0e0; }
      .subtitle { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; font-size: 32px; font-weight: 400; fill: #888888; }
      .code { font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace; font-size: 14px; }
      .accent { fill: #ab47bc; }
      .green { fill: #50fa7b; }
      .keyword { fill: #c678dd; }
      .string { fill: #98c379; }
      .node { fill: #61afef; }
      .comment { fill: #5c6370; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="#1e1e1e"/>

  <!-- Grid pattern -->
  <g opacity="0.06" style="animation: gridPulse 4s ease-in-out infinite;">
    <!-- Vertical grid lines -->
    <line x1="80" y1="0" x2="80" y2="640" stroke="#ab47bc" stroke-width="1"/>
    <line x1="160" y1="0" x2="160" y2="640" stroke="#ab47bc" stroke-width="1"/>
    <line x1="240" y1="0" x2="240" y2="640" stroke="#ab47bc" stroke-width="1"/>
    <line x1="320" y1="0" x2="320" y2="640" stroke="#ab47bc" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="640" stroke="#ab47bc" stroke-width="1"/>
    <line x1="480" y1="0" x2="480" y2="640" stroke="#ab47bc" stroke-width="1"/>
    <line x1="560" y1="0" x2="560" y2="640" stroke="#ab47bc" stroke-width="1"/>
    <line x1="640" y1="0" x2="640" y2="640" stroke="#ab47bc" stroke-width="1"/>
    <line x1="720" y1="0" x2="720" y2="640" stroke="#ab47bc" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="640" stroke="#ab47bc" stroke-width="1"/>
    <line x1="880" y1="0" x2="880" y2="640" stroke="#ab47bc" stroke-width="1"/>
    <line x1="960" y1="0" x2="960" y2="640" stroke="#ab47bc" stroke-width="1"/>
    <line x1="1040" y1="0" x2="1040" y2="640" stroke="#ab47bc" stroke-width="1"/>
    <line x1="1120" y1="0" x2="1120" y2="640" stroke="#ab47bc" stroke-width="1"/>
    <line x1="1200" y1="0" x2="1200" y2="640" stroke="#ab47bc" stroke-width="1"/>
    <!-- Horizontal grid lines -->
    <line x1="0" y1="80" x2="1280" y2="80" stroke="#ab47bc" stroke-width="1"/>
    <line x1="0" y1="160" x2="1280" y2="160" stroke="#ab47bc" stroke-width="1"/>
    <line x1="0" y1="240" x2="1280" y2="240" stroke="#ab47bc" stroke-width="1"/>
    <line x1="0" y1="320" x2="1280" y2="320" stroke="#ab47bc" stroke-width="1"/>
    <line x1="0" y1="400" x2="1280" y2="400" stroke="#ab47bc" stroke-width="1"/>
    <line x1="0" y1="480" x2="1280" y2="480" stroke="#ab47bc" stroke-width="1"/>
    <line x1="0" y1="560" x2="1280" y2="560" stroke="#ab47bc" stroke-width="1"/>
  </g>

  <!-- Decorative pane borders (Zellij-style) -->
  <!-- Top-left pane -->
  <g opacity="0.15" style="animation: fadeIn 2s ease-in;">
    <rect x="40" y="60" width="280" height="180" rx="4" fill="none" stroke="#ab47bc" stroke-width="2"/>
    <rect x="40" y="60" width="280" height="24" rx="4" fill="#ab47bc" fill-opacity="0.15"/>
    <text x="55" y="77" class="code comment" font-size="11">~/.config/zellij/config.kdl</text>
    <text x="55" y="105" class="code keyword" font-size="12">keybinds</text>
    <text x="127" y="105" class="code" fill="#abb2bf" font-size="12">{</text>
    <text x="65" y="125" class="code node" font-size="12">normal</text>
    <text x="110" y="125" class="code" fill="#abb2bf" font-size="12">{</text>
    <text x="75" y="145" class="code node" font-size="12">bind</text>
    <text x="107" y="145" class="code string" font-size="12">"Ctrl a"</text>
    <text x="172" y="145" class="code" fill="#abb2bf" font-size="12">{ }</text>
  </g>

  <!-- Top-right pane -->
  <g opacity="0.15" style="animation: fadeIn 2.5s ease-in;">
    <rect x="960" y="60" width="280" height="180" rx="4" fill="none" stroke="#50fa7b" stroke-width="2"/>
    <rect x="960" y="60" width="280" height="24" rx="4" fill="#50fa7b" fill-opacity="0.15"/>
    <text x="975" y="77" class="code comment" font-size="11">layout.kdl</text>
    <text x="975" y="105" class="code node" font-size="12">layout</text>
    <text x="1017" y="105" class="code" fill="#abb2bf" font-size="12">{</text>
    <text x="985" y="125" class="code node" font-size="12">pane</text>
    <text x="1013" y="125" class="code node" font-size="12">split_direction=</text>
    <text x="1120" y="125" class="code string" font-size="12">"vertical"</text>
    <text x="985" y="145" class="code node" font-size="12">pane</text>
    <text x="1013" y="145" class="code node" font-size="12">size=</text>
    <text x="1045" y="145" class="code string" font-size="12">"50%"</text>
  </g>

  <!-- Bottom-left pane -->
  <g opacity="0.12" style="animation: fadeIn 3s ease-in;">
    <rect x="40" y="400" width="280" height="180" rx="4" fill="none" stroke="#50fa7b" stroke-width="2"/>
    <rect x="40" y="400" width="280" height="24" rx="4" fill="#50fa7b" fill-opacity="0.15"/>
    <text x="55" y="417" class="code comment" font-size="11">themes/dracula.kdl</text>
    <text x="55" y="445" class="code node" font-size="12">themes</text>
    <text x="100" y="445" class="code" fill="#abb2bf" font-size="12">{</text>
    <text x="65" y="465" class="code node" font-size="12">dracula</text>
    <text x="112" y="465" class="code" fill="#abb2bf" font-size="12">{</text>
    <text x="75" y="485" class="code node" font-size="12">fg</text>
    <text x="93" y="485" class="code string" font-size="12">"#f8f8f2"</text>
    <text x="75" y="505" class="code node" font-size="12">green</text>
    <text x="110" y="505" class="code string" font-size="12">"#50fa7b"</text>
  </g>

  <!-- Bottom-right pane -->
  <g opacity="0.12" style="animation: fadeIn 3.5s ease-in;">
    <rect x="960" y="400" width="280" height="180" rx="4" fill="none" stroke="#ab47bc" stroke-width="2"/>
    <rect x="960" y="400" width="280" height="24" rx="4" fill="#ab47bc" fill-opacity="0.15"/>
    <text x="975" y="417" class="code comment" font-size="11">PROBLEMS</text>
    <text x="975" y="448" class="code" fill="#50fa7b" font-size="12">0 errors, 0 warnings</text>
    <circle cx="968" cy="444" r="4" fill="#50fa7b" opacity="0.6"/>
  </g>

  <!-- Central glow -->
  <ellipse cx="640" cy="300" rx="350" ry="180" fill="#ab47bc" opacity="0.04"/>
  <ellipse cx="640" cy="300" rx="200" ry="100" fill="#ab47bc" opacity="0.06"/>

  <!-- Title -->
  <g style="animation: slideUp 1s ease-out;">
    <text x="640" y="270" text-anchor="middle" class="title" letter-spacing="-1">Zellij Config</text>
  </g>

  <!-- Subtitle -->
  <g style="animation: slideUp 1.3s ease-out;">
    <text x="640" y="320" text-anchor="middle" class="subtitle">VS Code Extension</text>
  </g>

  <!-- Tagline -->
  <g style="animation: slideUp 1.6s ease-out;">
    <text x="640" y="370" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="18" fill="#50fa7b" opacity="0.8">IntelliSense  ·  Validation  ·  Hover Docs  ·  Color Preview  ·  Snippets</text>
  </g>

  <!-- Decorative corner accents -->
  <path d="M0,0 L60,0 L60,3 L3,3 L3,60 L0,60 Z" fill="#ab47bc" opacity="0.3"/>
  <path d="M1280,0 L1220,0 L1220,3 L1277,3 L1277,60 L1280,60 Z" fill="#ab47bc" opacity="0.3"/>
  <path d="M0,640 L60,640 L60,637 L3,637 L3,580 L0,580 Z" fill="#50fa7b" opacity="0.3"/>
  <path d="M1280,640 L1220,640 L1220,637 L1277,637 L1277,580 L1280,580 Z" fill="#50fa7b" opacity="0.3"/>

  <!-- Terminal cursor blink -->
  <rect x="654" y="380" width="2" height="18" fill="#50fa7b" opacity="0.7" style="animation: blink 1.2s step-end infinite;"/>
</svg>