<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <style>
      @keyframes fadeInDropdown { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes cursorBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
      @keyframes highlightRow { from { opacity: 0; } to { opacity: 1; } }
      .mono { font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace; }
      .ui { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; }
    </style>
  </defs>

  <!-- Window frame -->
  <rect width="800" height="400" rx="8" fill="#1e1e1e"/>
  <rect width="800" height="36" rx="8" fill="#323233"/>
  <rect y="28" width="800" height="8" fill="#323233"/>

  <!-- Window controls -->
  <circle cx="20" cy="18" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="18" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="18" r="6" fill="#27c93f"/>

  <!-- Title -->
  <text x="400" y="22" text-anchor="middle" class="ui" font-size="12" fill="#999">config.kdl - Zellij Config</text>

  <!-- Tab bar -->
  <rect y="36" width="800" height="28" fill="#252526"/>
  <rect x="0" y="36" width="140" height="28" fill="#1e1e1e"/>
  <text x="14" y="54" class="ui" font-size="11" fill="#cccccc">config.kdl</text>
  <rect x="0" y="62" width="140" height="2" fill="#ab47bc"/>

  <!-- Line numbers gutter -->
  <rect x="0" y="64" width="44" height="336" fill="#1e1e1e"/>

  <!-- Editor content -->
  <text x="30" y="88" class="mono" font-size="13" fill="#5c6370" text-anchor="end">1</text>
  <text x="52" y="88" class="mono" font-size="13" fill="#5c6370">// Zellij configuration</text>

  <text x="30" y="110" class="mono" font-size="13" fill="#5c6370" text-anchor="end">2</text>
  <text x="52" y="110" class="mono" font-size="13" fill="#c678dd">simplified_ui</text>
  <text x="164" y="110" class="mono" font-size="13" fill="#d19a66"> true</text>

  <text x="30" y="132" class="mono" font-size="13" fill="#5c6370" text-anchor="end">3</text>
  <text x="52" y="132" class="mono" font-size="13" fill="#c678dd">pane_frames</text>
  <text x="156" y="132" class="mono" font-size="13" fill="#d19a66"> true</text>

  <text x="30" y="154" class="mono" font-size="13" fill="#5c6370" text-anchor="end">4</text>
  <text x="52" y="154" class="mono" font-size="13" fill="#c678dd">theme</text>
  <text x="100" y="154" class="mono" font-size="13" fill="#98c379"> "dracula"</text>

  <text x="30" y="176" class="mono" font-size="13" fill="#5c6370" text-anchor="end">5</text>
  <!-- Cursor position -->
  <rect x="52" y="164" width="2" height="16" fill="#aeafad" style="animation: cursorBlink 1.2s step-end infinite;"/>

  <text x="30" y="198" class="mono" font-size="13" fill="#5c6370" text-anchor="end">6</text>

  <!-- Autocomplete dropdown -->
  <g style="animation: fadeInDropdown 0.5s ease-out 0.8s both;">
    <rect x="48" y="180" width="380" height="195" rx="4" fill="#252526" stroke="#454545" stroke-width="1"/>

    <!-- Selected item highlight -->
    <rect x="49" y="181" width="378" height="24" fill="#094771" style="animation: highlightRow 0.3s ease-out 1.2s both;"/>

    <!-- Completion items -->
    <text x="62" y="198" class="mono" font-size="12" fill="#e0e0e0">default_shell</text>
    <text x="310" y="198" class="mono" font-size="11" fill="#888">string</text>
    <rect x="56" y="188" width="3" height="12" rx="1" fill="#ab47bc"/>

    <text x="62" y="222" class="mono" font-size="12" fill="#bbbbbb">default_layout</text>
    <text x="310" y="222" class="mono" font-size="11" fill="#888">string</text>
    <rect x="56" y="212" width="3" height="12" rx="1" fill="#ab47bc"/>

    <text x="62" y="246" class="mono" font-size="12" fill="#bbbbbb">default_mode</text>
    <text x="310" y="246" class="mono" font-size="11" fill="#888">enum</text>
    <rect x="56" y="236" width="3" height="12" rx="1" fill="#ab47bc"/>

    <text x="62" y="270" class="mono" font-size="12" fill="#bbbbbb">mouse_mode</text>
    <text x="310" y="270" class="mono" font-size="11" fill="#888">boolean</text>
    <rect x="56" y="260" width="3" height="12" rx="1" fill="#ab47bc"/>

    <text x="62" y="294" class="mono" font-size="12" fill="#bbbbbb">scroll_buffer_size</text>
    <text x="310" y="294" class="mono" font-size="11" fill="#888">number</text>
    <rect x="56" y="284" width="3" height="12" rx="1" fill="#ab47bc"/>

    <text x="62" y="318" class="mono" font-size="12" fill="#bbbbbb">copy_on_select</text>
    <text x="310" y="318" class="mono" font-size="11" fill="#888">boolean</text>
    <rect x="56" y="308" width="3" height="12" rx="1" fill="#ab47bc"/>

    <text x="62" y="342" class="mono" font-size="12" fill="#bbbbbb">scrollback_editor</text>
    <text x="310" y="342" class="mono" font-size="11" fill="#888">string</text>
    <rect x="56" y="332" width="3" height="12" rx="1" fill="#ab47bc"/>

    <text x="62" y="366" class="mono" font-size="12" fill="#bbbbbb">on_force_close</text>
    <text x="310" y="366" class="mono" font-size="11" fill="#888">enum</text>
    <rect x="56" y="356" width="3" height="12" rx="1" fill="#ab47bc"/>
  </g>

  <!-- Detail panel -->
  <g style="animation: fadeInDropdown 0.5s ease-out 1.4s both;">
    <rect x="432" y="180" width="260" height="72" rx="4" fill="#252526" stroke="#454545" stroke-width="1"/>
    <text x="446" y="200" class="ui" font-size="12" fill="#cccccc" font-weight="600">default_shell</text>
    <text x="446" y="218" class="ui" font-size="11" fill="#999">Path to the default shell.</text>
    <text x="446" y="238" class="mono" font-size="11" fill="#888">Default:</text>
    <text x="504" y="238" class="mono" font-size="11" fill="#98c379">$SHELL</text>
  </g>
</svg>