<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <style>
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      .mono { font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace; }
      .ui { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; }
    </style>
  </defs>

  <!-- Window frame -->
  <rect width="800" height="400" rx="8" fill="#1e1e1e"/>
  <rect width="800" height="36" rx="8" fill="#323233"/>
  <rect y="28" width="800" height="8" fill="#323233"/>

  <!-- Window controls -->
  <circle cx="20" cy="18" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="18" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="18" r="6" fill="#27c93f"/>

  <text x="400" y="22" text-anchor="middle" class="ui" font-size="12" fill="#999">config.kdl - Zellij Config</text>

  <!-- Tab bar -->
  <rect y="36" width="800" height="28" fill="#252526"/>
  <rect x="0" y="36" width="140" height="28" fill="#1e1e1e"/>
  <text x="14" y="54" class="ui" font-size="11" fill="#cccccc">config.kdl</text>
  <rect x="0" y="62" width="140" height="2" fill="#ab47bc"/>

  <!-- Line numbers gutter -->
  <rect x="0" y="64" width="44" height="200" fill="#1e1e1e"/>

  <!-- Editor content -->
  <text x="30" y="88" class="mono" font-size="13" fill="#5c6370" text-anchor="end">1</text>
  <text x="52" y="88" class="mono" font-size="13" fill="#5c6370">// Config with errors</text>

  <text x="30" y="110" class="mono" font-size="13" fill="#5c6370" text-anchor="end">2</text>
  <text x="52" y="110" class="mono" font-size="13" fill="#c678dd">simplified_ui</text>
  <text x="164" y="110" class="mono" font-size="13" fill="#d19a66"> true</text>

  <!-- Line 3: unknown option (warning) -->
  <text x="30" y="132" class="mono" font-size="13" fill="#5c6370" text-anchor="end">3</text>
  <text x="52" y="132" class="mono" font-size="13" fill="#c678dd">unknown_option</text>
  <text x="180" y="132" class="mono" font-size="13" fill="#d19a66"> true</text>
  <!-- Yellow squiggly underline -->
  <g style="animation: fadeIn 0.5s ease-out 0.3s both;">
    <path d="M52,137 l2,-2 l2,2 l2,-2 l2,2 l2,-2 l2,2 l2,-2 l2,2 l2,-2 l2,2 l2,-2 l2,2 l2,-2 l2,2 l2,-2 l2,2 l2,-2 l2,2 l2,-2 l2,2 l2,-2 l2,2 l2,-2 l2,2 l2,-2 l2,2 l2,-2 l2,2 l2,-2 l2,2 l2,-2 l2,2 l2,-2 l2,2" fill="none" stroke="#e5c07b" stroke-width="1.2"/>
  </g>

  <!-- Line 4: invalid boolean (error) -->
  <text x="30" y="154" class="mono" font-size="13" fill="#5c6370" text-anchor="end">4</text>
  <text x="52" y="154" class="mono" font-size="13" fill="#c678dd">pane_frames</text>
  <text x="156" y="154" class="mono" font-size="13" fill="#98c379"> "yes"</text>
  <!-- Red squiggly underline on "yes" -->
  <g style="animation: fadeIn 0.5s ease-out 0.5s both;">
    <path d="M160,159 l2,-2 l2,2 l2,-2 l2,2 l2,-2 l2,2 l2,-2 l2,2 l2,-2 l2,2 l2,-2 l2,2 l2,-2 l2,2" fill="none" stroke="#f44747" stroke-width="1.2"/>
  </g>

  <!-- Line 5: theme block -->
  <text x="30" y="176" class="mono" font-size="13" fill="#5c6370" text-anchor="end">5</text>
  <text x="52" y="176" class="mono" font-size="13" fill="#61afef">themes</text>
  <text x="104" y="176" class="mono" font-size="13" fill="#abb2bf"> {</text>

  <text x="30" y="198" class="mono" font-size="13" fill="#5c6370" text-anchor="end">6</text>
  <text x="72" y="198" class="mono" font-size="13" fill="#61afef">custom</text>
  <text x="114" y="198" class="mono" font-size="13" fill="#abb2bf"> {</text>

  <!-- Line 7: invalid hex color (error) -->
  <text x="30" y="220" class="mono" font-size="13" fill="#5c6370" text-anchor="end">7</text>
  <text x="92" y="220" class="mono" font-size="13" fill="#61afef">fg</text>
  <text x="110" y="220" class="mono" font-size="13" fill="#98c379"> "#xyz"</text>
  <!-- Red squiggly underline on #xyz -->
  <g style="animation: fadeIn 0.5s ease-out 0.7s both;">
    <path d="M114,225 l2,-2 l2,2 l2,-2 l2,2 l2,-2 l2,2 l2,-2 l2,2 l2,-2 l2,2 l2,-2 l2,2 l2,-2 l2,2 l2,-2 l2,2" fill="none" stroke="#f44747" stroke-width="1.2"/>
  </g>

  <text x="30" y="242" class="mono" font-size="13" fill="#5c6370" text-anchor="end">8</text>
  <text x="92" y="242" class="mono" font-size="13" fill="#61afef">bg</text>
  <text x="110" y="242" class="mono" font-size="13" fill="#98c379"> "#282a36"</text>

  <text x="30" y="264" class="mono" font-size="13" fill="#5c6370" text-anchor="end">9</text>
  <text x="72" y="264" class="mono" font-size="13" fill="#abb2bf">}</text>

  <text x="30" y="286" class="mono" font-size="13" fill="#5c6370" text-anchor="end">10</text>
  <text x="52" y="286" class="mono" font-size="13" fill="#abb2bf">}</text>

  <!-- Problems panel -->
  <g style="animation: slideUp 0.5s ease-out 0.8s both;">
    <!-- Panel background -->
    <rect x="0" y="298" width="800" height="102" fill="#1e1e1e"/>
    <rect x="0" y="298" width="800" height="26" fill="#252526"/>

    <!-- Panel tabs -->
    <text x="16" y="315" class="ui" font-size="12" fill="#e0e0e0" font-weight="600">PROBLEMS</text>
    <!-- Error/warning count badges -->
    <rect x="100" y="304" width="18" height="16" rx="8" fill="#f44747"/>
    <text x="109" y="316" text-anchor="middle" class="ui" font-size="10" fill="#ffffff" font-weight="600">2</text>
    <rect x="122" y="304" width="18" height="16" rx="8" fill="#e5c07b"/>
    <text x="131" y="316" text-anchor="middle" class="ui" font-size="10" fill="#1e1e1e" font-weight="600">1</text>

    <!-- Problem items -->
    <!-- Warning -->
    <g>
      <text x="22" y="342" class="ui" font-size="18" fill="#e5c07b">&#9888;</text>
      <text x="42" y="342" class="ui" font-size="12" fill="#cccccc">Unknown config option:</text>
      <text x="200" y="342" class="mono" font-size="12" fill="#e5c07b">unknown_option</text>
      <text x="680" y="342" class="mono" font-size="11" fill="#888">[3, 1]</text>
    </g>

    <!-- Error 1 -->
    <g>
      <text x="22" y="362" class="ui" font-size="16" fill="#f44747">&#10008;</text>
      <text x="42" y="362" class="ui" font-size="12" fill="#cccccc">Invalid boolean value.</text>
      <text x="196" y="362" class="mono" font-size="12" fill="#888">Expected</text>
      <text x="260" y="362" class="mono" font-size="12" fill="#d19a66">true</text>
      <text x="290" y="362" class="mono" font-size="12" fill="#888">or</text>
      <text x="312" y="362" class="mono" font-size="12" fill="#d19a66">false</text>
      <text x="680" y="362" class="mono" font-size="11" fill="#888">[4, 13]</text>
    </g>

    <!-- Error 2 -->
    <g>
      <text x="22" y="382" class="ui" font-size="16" fill="#f44747">&#10008;</text>
      <text x="42" y="382" class="ui" font-size="12" fill="#cccccc">Invalid hex color:</text>
      <text x="170" y="382" class="mono" font-size="12" fill="#f44747">#xyz</text>
      <text x="208" y="382" class="mono" font-size="12" fill="#888">is not a valid color</text>
      <text x="680" y="382" class="mono" font-size="11" fill="#888">[7, 5]</text>
    </g>
  </g>
</svg>