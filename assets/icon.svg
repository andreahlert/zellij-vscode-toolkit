<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d1b36"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="paneGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ab47bc"/>
      <stop offset="100%" stop-color="#8e24aa"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="128" height="128" rx="22" fill="url(#bgGrad)"/>

  <!-- Subtle border -->
  <rect x="2" y="2" width="124" height="124" rx="20" fill="none" stroke="#ab47bc" stroke-width="1.5" opacity="0.4"/>

  <!-- Pane grid (Zellij-style 2x2 layout) -->
  <!-- Top-left pane -->
  <rect x="18" y="18" width="40" height="36" rx="3" fill="none" stroke="#ab47bc" stroke-width="2" opacity="0.8"/>
  <!-- Top-right pane -->
  <rect x="62" y="18" width="48" height="36" rx="3" fill="none" stroke="#ab47bc" stroke-width="2" opacity="0.8"/>
  <!-- Bottom-left pane -->
  <rect x="18" y="58" width="40" height="28" rx="3" fill="none" stroke="#50fa7b" stroke-width="2" opacity="0.7"/>
  <!-- Bottom-right pane -->
  <rect x="62" y="58" width="48" height="28" rx="3" fill="none" stroke="#50fa7b" stroke-width="2" opacity="0.7"/>

  <!-- Active pane indicator (top-left) -->
  <rect x="18" y="18" width="40" height="4" rx="2" fill="#ab47bc" opacity="0.6"/>

  <!-- Terminal text lines in panes -->
  <rect x="23" y="28" width="22" height="2" rx="1" fill="#ab47bc" opacity="0.4"/>
  <rect x="23" y="33" width="30" height="2" rx="1" fill="#e0e0e0" opacity="0.2"/>
  <rect x="23" y="38" width="16" height="2" rx="1" fill="#50fa7b" opacity="0.3"/>
  <rect x="23" y="43" width="26" height="2" rx="1" fill="#e0e0e0" opacity="0.2"/>

  <rect x="67" y="28" width="18" height="2" rx="1" fill="#61afef" opacity="0.3"/>
  <rect x="67" y="33" width="34" height="2" rx="1" fill="#e0e0e0" opacity="0.2"/>
  <rect x="67" y="38" width="24" height="2" rx="1" fill="#98c379" opacity="0.3"/>

  <rect x="23" y="64" width="28" height="2" rx="1" fill="#50fa7b" opacity="0.3"/>
  <rect x="23" y="69" width="20" height="2" rx="1" fill="#e0e0e0" opacity="0.2"/>
  <rect x="23" y="74" width="32" height="2" rx="1" fill="#e0e0e0" opacity="0.15"/>

  <rect x="67" y="64" width="30" height="2" rx="1" fill="#e0e0e0" opacity="0.2"/>
  <rect x="67" y="69" width="20" height="2" rx="1" fill="#d19a66" opacity="0.3"/>

  <!-- Gear/cog symbol (bottom-right area) -->
  <g transform="translate(88, 98)">
    <circle cx="0" cy="0" r="12" fill="none" stroke="#ab47bc" stroke-width="2.5" opacity="0.9"/>
    <circle cx="0" cy="0" r="5" fill="#ab47bc" opacity="0.5"/>
    <!-- Gear teeth -->
    <rect x="-2" y="-16" width="4" height="6" rx="1" fill="#ab47bc" opacity="0.9"/>
    <rect x="-2" y="10" width="4" height="6" rx="1" fill="#ab47bc" opacity="0.9"/>
    <rect x="-16" y="-2" width="6" height="4" rx="1" fill="#ab47bc" opacity="0.9"/>
    <rect x="10" y="-2" width="6" height="4" rx="1" fill="#ab47bc" opacity="0.9"/>
    <!-- Diagonal teeth -->
    <rect x="7.5" y="-12.5" width="4" height="6" rx="1" fill="#ab47bc" opacity="0.9" transform="rotate(45 9.5 -9.5)"/>
    <rect x="-11.5" y="6.5" width="4" height="6" rx="1" fill="#ab47bc" opacity="0.9" transform="rotate(45 -9.5 9.5)"/>
    <rect x="-11.5" y="-12.5" width="4" height="6" rx="1" fill="#ab47bc" opacity="0.9" transform="rotate(-45 -9.5 -9.5)"/>
    <rect x="7.5" y="6.5" width="4" height="6" rx="1" fill="#ab47bc" opacity="0.9" transform="rotate(-45 9.5 9.5)"/>
  </g>

  <!-- KDL text hint -->
  <text x="30" y="112" font-family="'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="14" font-weight="700" fill="#50fa7b" opacity="0.8">KDL</text>

  <!-- Subtle glow -->
  <ellipse cx="64" cy="50" rx="30" ry="25" fill="#ab47bc" opacity="0.08"/>
</svg>